<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#05081a">
  <title>Universo Relativo offline</title>
  <link rel="icon" href="images/favicon/favicon.ico" sizes="any">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;color:#f8fafc;background:radial-gradient(circle at 20% 20%,rgba(59,130,246,.24),transparent 28%),linear-gradient(135deg,#020617,#0f172a)}
    main{width:min(440px,100%);padding:28px;border:1px solid rgba(191,219,254,.18);border-radius:28px;background:rgba(15,23,42,.68);box-shadow:0 28px 70px rgba(0,0,0,.36);text-align:left}
    span{display:inline-flex;padding:8px 13px;border-radius:999px;background:rgba(124,58,237,.18);color:#c4b5fd;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
    h1{margin:18px 0 10px;font-size:1.7rem;line-height:1.15;color:#fff}
    p{margin:0 0 18px;color:#cbd5e1;line-height:1.6}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;width:100%;border-radius:16px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <main>
    <span>Sem conexão</span>
    <h1>Você está offline</h1>
    <p>Algumas partes do Universo Relativo precisam de internet para carregar dados, provas e progresso. Tente novamente quando a conexão voltar.</p>
    <a href="index.html">Tentar abrir novamente</a>
  </main>
</body>
</html>
